name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# GitHub's bundled JS actions (checkout/setup-python) still ship a Node 20
# launcher; opt their runtime into Node 24 to clear the deprecation warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  glue-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run glue test suite (stdlib only)
        run: python3 tests/test_glue.py
      - name: Compile-check all scripts
        run: |
          for f in scripts/*.py; do python3 -m py_compile "$f"; done
